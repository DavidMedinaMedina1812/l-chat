services:
  postgres:
    image: postgres:16
    container_name: l-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lchat_user
      POSTGRES_PASSWORD: lchat_password
      POSTGRES_DB: lchat_db
    ports:
      - "5432:5432"
    volumes:
      - lchat_postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: l-chat-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  lchat_postgres_data: